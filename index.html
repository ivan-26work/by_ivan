<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ano23 - Test OneSignal</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0c4a6e, #0284c7);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .logo {
      width: 60px;
      height: 60px;
      background: #0ea5e9;
      border-radius: 18px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #0f172a; }
    .sub { color: #64748b; margin-bottom: 24px; font-size: 14px; }
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      margin-bottom: 12px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
      display: none;
    }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .status.info { background: #dbeafe; color: #1e40af; display: block; }
    .hidden { display: none; }
  </style>
  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "5bc6ebfb-bed3-46b7-a9be-0f269a24006b",
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
  <div class="logo">✉️</div>
  <h1>Ano23 Test</h1>
  <div class="sub">Test des notifications OneSignal</div>

  <!-- Connexion -->
  <div id="loginForm">
    <input type="email" id="email" placeholder="Email" value="ipoteivan5@gmail.com">
    <input type="password" id="password" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
  </div>

  <!-- Zone test (après connexion) -->
  <div id="testZone" style="display:none">
    <div id="userInfo" style="background:#f1f5f9; border-radius:16px; padding:12px; margin-bottom:16px"></div>
    <button id="testNotifBtn">🔔 Tester notification manuelle</button>
    <div id="status" class="status"></div>
  </div>
</div>

<script>
  // Supabase
  const SUPABASE_URL = 'https://waogbrxqyysibttlpoxj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhb2dicnhxeXlzaWJ0dGxwb3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjE3NzUsImV4cCI6MjA5MDczNzc3NX0.Op1DUBfefbO2RkoitXws-7cFLW1T0DJGBDh1YPDcB1w';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUserId = null;

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status ${type}`;
  }

  // Envoyer notification OneSignal
  async function sendTestNotification() {
    showStatus('Envoi de la notification...', 'info');
    try {
      const OneSignal = window.OneSignalDeferred;
      if (!OneSignal) {
        showStatus('OneSignal non disponible', 'error');
        return;
      }
      const os = await OneSignal;
      os.sendSelfNotification(
        "Test Ano23",
        "Ceci est une notification de test ! ✅",
        window.location.href,
        { icon: "./images/icon.png" }
      );
      showStatus('Notification envoyée ! Vérifiez votre écran.', 'success');
    } catch (err) {
      showStatus('Erreur: ' + err.message, 'error');
    }
  }

  // Enregistrer External ID sur OneSignal
  async function registerOneSignalUser(userId) {
    try {
      const OneSignal = window.OneSignalDeferred;
      if (!OneSignal) return false;
      const os = await OneSignal;
      await os.login(userId);
      const externalId = await os.getExternalUserId();
      console.log('External ID set:', externalId);
      return externalId === userId;
    } catch (err) {
      console.error('OneSignal login error:', err);
      return false;
    }
  }

  // Connexion
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
      showStatus('Veuillez remplir tous les champs', 'error');
      return;
    }

    showStatus('Connexion en cours...', 'info');
    
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) {
      showStatus('Erreur: ' + error.message, 'error');
      return;
    }
    
    currentUserId = data.user.email.split('@')[0];
    
    // Enregistrer sur OneSignal
    const registered = await registerOneSignalUser(currentUserId);
    
    if (registered) {
      showStatus(`✅ Connecté en tant que @${currentUserId} - OneSignal OK`, 'success');
    } else {
      showStatus(`⚠️ Connecté mais OneSignal non enregistré`, 'info');
    }
    
    // Afficher zone test
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('testZone').style.display = 'block';
    document.getElementById('userInfo').innerHTML = `👤 @${currentUserId}<br>📱 OneSignal: ${registered ? '✅ lié' : '❌ non lié'}`;
  };

  // Bouton test notification
  document.getElementById('testNotifBtn').onclick = sendTestNotification;
</script>
</body>
</html>
